<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StepAI">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230a0a0f' width='180' height='180'/><text x='50%' y='50%' font-size='80' fill='%2300d9ff' text-anchor='middle' dy='.3em' font-weight='bold'>S</text></svg>">
    <title>StepAI — Smart Step Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #16213e 100%);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d9ff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .modal-input::placeholder {
            color: #a0a0c0;
        }

        .modal-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #0a0a0f;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .modal-btn:active {
            transform: scale(0.98);
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d9ff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .username {
            font-size: 0.9rem;
            color: #a0a0c0;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .username:hover {
            background: rgba(0, 217, 255, 0.1);
            color: #00d9ff;
        }

        .step-display {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-count {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d9ff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .step-label {
            font-size: 0.95rem;
            color: #a0a0c0;
            margin-top: 8px;
            font-weight: 500;
        }

        .install-section {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .install-btn {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #0a0a0f;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
            width: 100%;
        }

        .install-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 217, 255, 0.2);
        }

        .install-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .install-hint {
            text-align: center;
            font-size: 0.85rem;
            color: #a0a0c0;
            padding: 12px;
            margin-top: 10px;
            line-height: 1.5;
        }

        .install-hint strong {
            color: #00d9ff;
            display: block;
            margin-bottom: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0ff;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-small.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
            color: #00d9ff;
        }

        .btn-small:active {
            transform: scale(0.98);
        }

        .history-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.05);
        }

        .history-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e0e0ff;
        }

        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 15px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #00d9ff 0%, #0099cc 100%);
            border-radius: 8px 8px 0 0;
            min-height: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .chart-bar:hover {
            opacity: 1;
            transform: scaleY(1.05);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .stats-row:first-child {
            border-top: none;
        }

        .stats-label {
            color: #a0a0c0;
        }

        .stats-value {
            color: #00d9ff;
            font-weight: 600;
        }

        .leaderboard-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.05);
        }

        .leaderboard-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e0e0ff;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #00d9ff;
        }

        .leaderboard-rank {
            font-weight: 700;
            color: #00d9ff;
            min-width: 30px;
        }

        .leaderboard-name {
            color: #e0e0ff;
            font-weight: 500;
            flex: 1;
            margin-left: 10px;
        }

        .leaderboard-steps {
            color: #a0a0c0;
            font-size: 0.9rem;
        }

        .pro-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.05);
            transition: all 0.5s ease;
        }

        .pro-section.locked {
            opacity: 0.6;
        }

        .pro-section.unlocked {
            border-color: rgba(0, 217, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.2);
        }

        .pro-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0e0ff;
        }

        .pro-message {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 15px;
        }

        .ai-insights {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0ff;
        }

        .ai-insights p {
            margin: 8px 0;
        }

        .time-display {
            font-size: 0.85rem;
            color: #a0a0c0;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-height: 700px) {
            .container {
                gap: 15px;
            }
            .step-display {
                padding: 30px 20px;
            }
            .step-count {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Welcome to StepAI</div>
            <input type="text" id="nameInput" class="modal-input" placeholder="Enter your name" maxlength="20">
            <button class="modal-btn" onclick="saveName()">Start Tracking</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>StepAI</h1>
            <div class="username" id="usernameDisplay" onclick="changeName()">👤 You</div>
        </div>

        <div class="step-display">
            <div class="step-count" id="stepCount">0</div>
            <div class="step-label">steps today</div>
            <div class="install-section">
                <button class="install-btn" id="installBtn" onclick="handleInstall()">📱 Install App</button>
                <div class="install-hint" id="installHint"></div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">📊 Activity History</div>
            <div class="button-group">
                <button class="btn-small active" onclick="switchPeriod('1')">1D</button>
                <button class="btn-small" onclick="switchPeriod('7')">7D</button>
                <button class="btn-small" onclick="switchPeriod('30')">30D</button>
                <button class="btn-small" onclick="switchPeriod('365')">1Y</button>
            </div>
            <div class="chart-container" id="chartContainer"></div>
            <div class="stats-row">
                <span class="stats-label">Average:</span>
                <span class="stats-value" id="avgSteps">0 steps</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Peak Day:</span>
                <span class="stats-value" id="peakSteps">0 steps</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">Total:</span>
                <span class="stats-value" id="totalSteps">0 steps</span>
            </div>
        </div>

        <div class="leaderboard-section">
            <div class="leaderboard-title">🏆 All-Time Leaderboard</div>
            <div id="leaderboard"></div>
        </div>

        <div class="pro-section locked" id="proSection">
            <div class="pro-title">🤖 AI Coach</div>
            <div class="pro-message" id="proMessage">Use the app for 3 hours to unlock AI Coach</div>
            <div class="ai-insights" id="aiInsights"></div>
            <div class="time-display" id="timeDisplay"></div>
        </div>
    </div>

    <script>
        // ==================== UTILITIES ====================
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }

        function isSafari() {
            return /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
        }

        function isIOSSafari() {
            return isIOS() && isSafari();
        }

        // ==================== STATE ====================
        let steps = 0;
        let dailySteps = {};
        let currentPeriod = '1';
        let userName = localStorage.getItem('userName') || '';
        let allTimeSteps = Number(localStorage.getItem('allTimeSteps')) || 0;

        let startTime = Date.now();
        let totalUsageTime = Number(localStorage.getItem('usageTime')) || 0;
        const PRO_UNLOCK_TIME = 10800000; // 3 hours in ms

        // Advanced step detector state
        const stepDetector = {
            accelBuffer: [],
            lastStepTime: 0,
            minStepInterval: 250,
            bufferSize: 10,
            threshold: 0.5,
            refractory: 400,
            lastPeakTime: 0
        };

        // ==================== NAME MANAGEMENT ====================
        function saveName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                userName = name;
                localStorage.setItem('userName', name);
                document.getElementById('nameModal').style.display = 'none';
                updateUsernameDisplay();
            }
        }

        function changeName() {
            document.getElementById('nameInput').value = userName;
            document.getElementById('nameModal').style.display = 'flex';
        }

        function updateUsernameDisplay() {
            document.getElementById('usernameDisplay').textContent = `👤 ${userName || 'You'}`;
        }

        // ==================== INSTALL HANDLING ====================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            updateInstallUI();
        });

        function updateInstallUI() {
            const btn = document.getElementById('installBtn');
            const hint = document.getElementById('installHint');

            if (isIOSSafari()) {
                // iOS Safari - show manual instructions
                btn.textContent = '📱 Add to Home Screen';
                hint.innerHTML = `<strong>How to install:</strong>
                1. Tap the Share button (⬆️)
                2. Scroll and tap "Add to Home Screen"
                3. Tap "Add"`;
                btn.onclick = () => {
                    hint.style.display = 'block';
                };
            } else if (deferredPrompt) {
                // Android/Chrome - show install button
                btn.textContent = '📱 Install App';
                hint.innerHTML = '';
                btn.onclick = handleInstall;
            } else {
                // Fallback
                btn.textContent = '📱 Install App';
                hint.innerHTML = 'App already installed or not available';
            }
        }

        function handleInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('App installed');
                    }
                    deferredPrompt = null;
                });
            }
        }

        // ==================== INITIALIZATION ====================
        function init() {
            if (!userName) {
                document.getElementById('nameModal').style.display = 'flex';
                document.getElementById('nameInput').focus();
            } else {
                document.getElementById('nameModal').style.display = 'none';
                updateUsernameDisplay();
            }

            loadData();
            requestMotionPermission();
            setupMotionListener();
            setupTimerInterval();
            updateUI();
            checkProUnlock();
            renderChart();
            renderLeaderboard();
            updateInstallUI();
        }

        function loadData() {
            const today = new Date().toDateString();
            const stored = localStorage.getItem('dailySteps');
            dailySteps = stored ? JSON.parse(stored) : {};
            
            if (!dailySteps[today]) {
                dailySteps[today] = 0;
            }
            steps = dailySteps[today];
        }

        function saveData() {
            const today = new Date().toDateString();
            dailySteps[today] = steps;
            localStorage.setItem('dailySteps', JSON.stringify(dailySteps));
            localStorage.setItem('allTimeSteps', allTimeSteps);
        }

        // ==================== ADVANCED STEP DETECTION ====================
        async function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        console.log('Motion permission granted');
                    }
                } catch (error) {
                    console.log('Motion permission denied');
                }
            }
        }

        function setupMotionListener() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', handleAdvancedMotion);
            }
        }

        function handleAdvancedMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            const magnitude = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
            
            stepDetector.accelBuffer.push(magnitude);
            if (stepDetector.accelBuffer.length > stepDetector.bufferSize) {
                stepDetector.accelBuffer.shift();
            }

            if (stepDetector.accelBuffer.length < stepDetector.bufferSize) return;

            const mean = stepDetector.accelBuffer.reduce((a, b) => a + b) / stepDetector.accelBuffer.length;
            const variance = stepDetector.accelBuffer.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / stepDetector.accelBuffer.length;
            const stdDev = Math.sqrt(variance);

            const current = stepDetector.accelBuffer[stepDetector.accelBuffer.length - 1];
            const isPeak = current > mean + (stepDetector.threshold * stdDev);

            if (isPeak) {
                const now = Date.now();
                
                if (now - stepDetector.lastPeakTime > stepDetector.refractory) {
                    if (stepDetector.lastStepTime > 0) {
                        const interval = now - stepDetector.lastStepTime;
                        if (interval > 300 && interval < 2000) {
                            recordStep(now);
                        }
                    } else {
                        recordStep(now);
                    }
                    stepDetector.lastPeakTime = now;
                }
            }
        }

        function recordStep(now) {
            steps++;
            allTimeSteps++;
            stepDetector.lastStepTime = now;
            updateUI();
            saveData();
        }

        // ==================== TIMER ====================
        function setupTimerInterval() {
            setInterval(() => {
                totalUsageTime += 1000;
                localStorage.setItem('usageTime', totalUsageTime);
                checkProUnlock();
                updateTimeDisplay();
            }, 1000);
        }

        function updateTimeDisplay() {
            const hours = Math.floor(totalUsageTime / 3600000);
            const minutes = Math.floor((totalUsageTime % 3600000) / 60000);
            const timeStr = `${hours}h ${minutes}m used`;
            const timeDisplay = document.getElementById('timeDisplay');
            if (timeDisplay) {
                timeDisplay.textContent = timeStr;
            }
        }

        // ==================== PRO UNLOCK ====================
        function checkProUnlock() {
            if (totalUsageTime >= PRO_UNLOCK_TIME) {
                const proSection = document.getElementById('proSection');
                if (proSection.classList.contains('locked')) {
                    proSection.classList.remove('locked');
                    proSection.classList.add('unlocked');
                    document.getElementById('proMessage').textContent = '🎉 You unlocked StepAI Pro!';
                    generateAIInsights();
                }
            }
        }

        // ==================== AI INSIGHTS ====================
        function generateAIInsights() {
            const today = new Date().toDateString();
            const todaySteps = dailySteps[today] || 0;
            
            const allSteps = Object.values(dailySteps);
            const avgSteps = allSteps.length > 0 ? Math.round(allSteps.reduce((a, b) => a + b) / allSteps.length) : 0;

            let message = '';
            if (todaySteps > avgSteps * 1.2) {
                message = `🚀 ${userName}, you're crushing it! ${todaySteps} steps is outstanding!`;
            } else if (todaySteps > avgSteps) {
                message = `💪 Great pace, ${userName}! You're ${Math.round((todaySteps / avgSteps - 1) * 100)}% above your average.`;
            } else if (todaySteps > 0) {
                message = `🎯 Keep moving, ${userName}! Every step counts toward your goals.`;
            } else {
                message = `👟 Time to get moving, ${userName}! Let's start your day.`;
            }

            const insights = document.getElementById('aiInsights');
            insights.innerHTML = `<p>${message}</p>`;
        }

        // ==================== UI UPDATES ====================
        function updateUI() {
            document.getElementById('stepCount').textContent = steps.toLocaleString();
            updateTimeDisplay();
        }

        function switchPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.btn-small').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderChart();
        }

        function renderChart() {
            const today = new Date();
            const data = [];
            let days = parseInt(currentPeriod);

            if (currentPeriod === '365') {
                for (let i = 25; i >= 0; i--) {
                    let twoWeekTotal = 0;
                    for (let j = 0; j < 14; j++) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - (i * 14 + j));
                        const dateStr = date.toDateString();
                        twoWeekTotal += dailySteps[dateStr] || 0;
                    }
                    data.push(twoWeekTotal);
                }
            } else {
                for (let i = days - 1; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toDateString();
                    data.push(dailySteps[dateStr] || 0);
                }
            }

            const maxSteps = Math.max(...data, 1000);
            const container = document.getElementById('chartContainer');
            container.innerHTML = '';

            data.forEach((stepCount) => {
                const height = (stepCount / maxSteps) * 100;
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = height + '%';
                bar.title = stepCount + ' steps';
                container.appendChild(bar);
            });

            updateStats(data);
        }

        function updateStats(data) {
            const avg = Math.round(data.reduce((a, b) => a + b) / data.length);
            const peak = Math.max(...data);
            const total = data.reduce((a, b) => a + b);

            document.getElementById('avgSteps').textContent = avg.toLocaleString() + ' steps';
            document.getElementById('peakSteps').textContent = peak.toLocaleString() + ' steps';
            document.getElementById('totalSteps').textContent = total.toLocaleString() + ' steps';
        }

        // ==================== LEADERBOARD ====================
        function renderLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            const leaders = [
                { name: userName || 'You', steps: allTimeSteps }
            ];

            leaders.sort((a, b) => b.steps - a.steps);

            leaderboard.innerHTML = leaders.map((leader, index) => `
                <div class="leaderboard-item">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-name">${leader.name}</span>
                    <span class="leaderboard-steps">${leader.steps.toLocaleString()} steps</span>
                </div>
            `).join('');
        }

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
